<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BullBir — Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #0d0d17 0%, #1a1a2e 50%, #1e1a3f 100%);
        color: #e8e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        overflow: hidden;
      }
      .wrap { max-width: 420px; }
      .logo {
        width: 96px; height: 96px; margin: 0 auto 32px;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
      h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; margin-bottom: 12px; }
      p { color: #9ca3c4; font-size: 15px; line-height: 1.6; }
      .pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #7c6ff7; margin-top: 24px; animation: pulse 1.5s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: .4; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="20" fill="#5b4fcf"/>
        <path d="M58 24V76" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
        <path d="M58 24L42 35" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M40 76H72" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
      </svg>
      <h1>Тармак жок</h1>
      <p>BullBir күтүп турат... Соединение пропало. Мы автоматически переподключимся, как только сеть вернётся.</p>
      <span class="pulse"></span>
    </div>
    <script>
      setInterval(() => { if (navigator.onLine) location.reload() }, 5000)
      window.addEventListener('online', () => location.reload())
    </script>
  </body>
</html>
